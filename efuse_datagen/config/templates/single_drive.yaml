# Single Drive — one ignition cycle (5 min), 65 channels, 21 faults
#
# Progression: quick_demo → single_drive → multi_day → fleet → stress_test
#
# Uses the bundled 4-zone / 65-channel BEV reference topology.
# To use your own: topology_file: ./path/to/my_vehicle.yaml
#
# Duration: 300 s — covers warm-up, nominal cruise, and fault windows

simulation:
  scenario_id: single_drive
  name: "Full Zone Controller \u2014 All 65 Channels"
  description: 'Complete 4-zone BEV/premium topology with 65 eFuse channels. Rich fault coverage across all zones: overload
    spikes, thermal drift, intermittent overloads, voltage sags, connector aging, open-load events, gradual degradation, and
    power-state transients.

    '
  duration_s: 300.0
  sample_interval_ms: 100.0
  seed: 77
  topology_file: bev_4zone_65ch
  power_state_events:
  - time_s: 0.0
    state: sleep
  - time_s: 5.0
    state: crank
  - time_s: 8.0
    state: active
  - time_s: 280.0
    state: sleep
  fault_injections:
  - channel_id: ch_002
    fault_type: thermal_drift
    start_s: 30.0
    duration_s: 60.0
    intensity: 0.65
  - channel_id: ch_004
    fault_type: overload_spike
    start_s: 10.0
    duration_s: 2.0
    intensity: 0.75
  - channel_id: ch_009
    fault_type: intermittent_overload
    start_s: 80.0
    duration_s: 40.0
    intensity: 0.55
  - channel_id: ch_012
    fault_type: voltage_sag
    start_s: 50.0
    duration_s: 10.0
    intensity: 0.7
  - channel_id: ch_015
    fault_type: connector_aging
    start_s: 120.0
    duration_s: 80.0
    intensity: 0.6
  - channel_id: ch_018
    fault_type: gradual_degradation
    start_s: 90.0
    duration_s: 150.0
    intensity: 0.45
  - channel_id: ch_021
    fault_type: noisy_sensor
    start_s: 60.0
    duration_s: 30.0
    intensity: 0.5
  - channel_id: ch_025
    fault_type: overload_spike
    start_s: 140.0
    duration_s: 3.0
    intensity: 0.8
  - channel_id: ch_026
    fault_type: intermittent_overload
    start_s: 35.0
    duration_s: 15.0
    intensity: 0.7
  - channel_id: ch_028
    fault_type: open_load
    start_s: 180.0
    duration_s: 60.0
    intensity: 0.9
  - channel_id: ch_031
