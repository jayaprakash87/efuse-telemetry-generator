# Multi-Day — 30 days of realistic driving, 65 channels, stochastic faults
#
# Progression: quick_demo → single_drive → multi_day → fleet → stress_test
#
# Uses the bundled 4-zone / 65-channel BEV reference topology.
# To use your own: topology_file: ./path/to/my_vehicle.yaml
#
# ~70-90 drive cycles, ~30-50 h total driving, ~10-15 M rows at 1 s interval.

simulation:
  scenario_id: multi_day_mixed
  name: "Multi-Day \u2014 Mixed Driving Profile"
  description: "30-day multi-cycle simulation with variable trip counts, durations, and driving conditions.  Fault injection\
    \ is fully stochastic \u2014 connector aging and gradual degradation intensify over the month.\n"
  sample_interval_ms: 1000.0
  seed: 42
  topology_file: bev_4zone_65ch
  drive_cycle:
    enabled: true
    total_days: 30
    profile: mixed
    mean_trips_per_day: 2.5
    max_trips_per_day: 6
    no_drive_day_probability: 0.1
    min_trip_minutes: 5
    max_trip_minutes: 240
    median_trip_minutes: 30
    ambient_temp_mean_c: 18.0
    ambient_temp_std_c: 8.0
    fault_rates:
      overload_spike: 0.05
      intermittent_overload: 0.03
      voltage_sag: 0.04
      thermal_drift: 0.02
      noisy_sensor: 0.03
      connector_aging: 0.01
      open_load: 0.005
      gradual_degradation: 0.01
      cold_crank: 0.5
      jump_start: 0.002
      load_dump: 0.02
      thermal_coupling: 0.03
      wake_transient: 0.15
      ground_offset: 0.02
      short_to_ground: 0.01
      dropped_packet: 0.03
features:
  window_duration_s: 5.0
  min_duration_s: 1.0
storage:
  output_dir: output
