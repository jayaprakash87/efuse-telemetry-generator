# BEV 4-Zone / 65-Channel Reference Topology
#
# A generic zonal EE architecture typical of modern BEV / premium platforms.
# Four zone controllers with ~65 eFuse channels covering all major domains:
#
#   zone_rear     ch_001-ch_025  (25 ch)  seating, lighting, infotainment, ADAS, drivetrain
#   zone_body     ch_026-ch_040  (15 ch)  doors, locks, cabin climate, body electronics
#   zone_front    ch_041-ch_055  (15 ch)  power supply, HVAC, suspension, auxiliary loads
#   zone_central  ch_056-ch_065  (10 ch)  power distribution, closures, reserves
#
# This file is intentionally vehicle-agnostic. Copy and edit to match your
# actual zone controller layout, eFuse ICs, wiring, and load assignments.
#
# Usage — reference from any scenario config:
#   simulation:
#     topology_file: bev_4zone_65ch       # bundled topology (this file)
#     # topology_file: ./my_vehicle.yaml  # or an absolute/relative path
#
# Each channel_spec must include: channel_id, zone_id, efuse_family, load_name.
# All other fields (wire_gauge, run_length, inrush, etc.) are optional and fall
# back to catalog defaults for the given efuse_family.

zones:
- zone_id: zone_rear
  name: Rear Zone Controller
  location: rear
  bus_interface: can
- zone_id: zone_body
  name: Body Zone Controller
  location: body
  bus_interface: can
- zone_id: zone_front
  name: Front Zone Controller
  location: front
  bus_interface: can
- zone_id: zone_central
  name: Central Zone Controller
  location: underhood
  bus_interface: can
channel_specs:
