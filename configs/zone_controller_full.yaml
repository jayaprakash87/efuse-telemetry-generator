# Full Zone Controller scenario — all 4 ZCs, 65 channels, rich fault coverage
#
# Topology: 4 Zone Controllers / 65 eFuse channels
#   zone_rear     ch_001–ch_025  (25 ch) — seating, lighting, infotainment, ADAS, drivetrain
#   zone_body     ch_026–ch_040  (15 ch) — doors, locks, cabin climate, body electronics
#   zone_front    ch_041–ch_055  (15 ch) — power supply, HVAC, suspension, auxiliary loads
#   zone_central  ch_056–ch_065  (10 ch) — power distribution, closures, reserves
#
# Duration: 300 s  (5 min) — covers warm-up, nominal cruise, and fault windows

simulation:
  scenario_id: zone_controller_full
  name: "Full Zone Controller — All 65 Channels"
  description: >
    Complete 4-zone BEV/premium topology with 65 eFuse channels.
    Rich fault coverage across all zones: overload spikes, thermal drift,
    intermittent overloads, voltage sags, connector aging, open-load events,
    gradual degradation, and power-state transients.
  duration_s: 300.0
  sample_interval_ms: 100.0
  seed: 77
  use_example_topology: true

  # Power state timeline — simulates ignition cycle
  power_state_events:
    - time_s: 0.0
      state: sleep
    - time_s: 5.0
      state: crank
    - time_s: 8.0
      state: active
    - time_s: 280.0
      state: sleep

  fault_injections:

    # ── zone_rear ─────────────────────────────────────────────────
    # ch_002  seat_heater_rear_right — PTC thermal drift (aging)
    - channel_id: ch_002
      fault_type: thermal_drift
      start_s: 30.0
      duration_s: 60.0
      intensity: 0.65

    # ch_004  seat_ventilation_pump — inrush overload spike at startup
    - channel_id: ch_004
      fault_type: overload_spike
      start_s: 10.0
      duration_s: 2.0
      intensity: 0.75

    # ch_009  tail_light_left — intermittent overload (corrosion in connector)
    - channel_id: ch_009
      fault_type: intermittent_overload
      start_s: 80.0
      duration_s: 40.0
      intensity: 0.55

    # ch_012  rear_defroster — voltage sag when defroster energised
    - channel_id: ch_012
      fault_type: voltage_sag
      start_s: 50.0
      duration_s: 10.0
      intensity: 0.70

    # ch_015  charge_port_controller — connector aging / fretting
    - channel_id: ch_015
      fault_type: connector_aging
      start_s: 120.0
      duration_s: 80.0
      intensity: 0.60

    # ch_018  rear_drive_inverter — gradual degradation over time
    - channel_id: ch_018
      fault_type: gradual_degradation
      start_s: 90.0
      duration_s: 150.0
      intensity: 0.45

    # ch_021  corner_radar_rear_left — noisy sensor (EMI environment)
    - channel_id: ch_021
      fault_type: noisy_sensor
      start_s: 60.0
      duration_s: 30.0
      intensity: 0.50

    # ch_025  active_damper_rear — overload during suspension event
    - channel_id: ch_025
      fault_type: overload_spike
      start_s: 140.0
      duration_s: 3.0
      intensity: 0.80

    # ── zone_body ─────────────────────────────────────────────────
    # ch_026  door_lock_front_left — intermittent overload (motor stiction)
    - channel_id: ch_026
      fault_type: intermittent_overload
      start_s: 35.0
      duration_s: 15.0
      intensity: 0.70

    # ch_028  door_lock_rear_left — open_load (wire break)
    - channel_id: ch_028
      fault_type: open_load
      start_s: 180.0
      duration_s: 60.0
      intensity: 0.90

    # ch_031  pdu_main_feed — voltage sag from cranking
    - channel_id: ch_031
      fault_type: voltage_sag
      start_s: 5.0
      duration_s: 3.0
      intensity: 0.85

    # ch_034  keyless_entry_module — connector aging
    - channel_id: ch_034
      fault_type: connector_aging
      start_s: 200.0
      duration_s: 70.0
      intensity: 0.55

    # ch_036  immobilizer_relay — noisy sensor
    - channel_id: ch_036
      fault_type: noisy_sensor
      start_s: 100.0
      duration_s: 20.0
      intensity: 0.40

    # ── zone_front ────────────────────────────────────────────────
    # ch_041  — voltage sag (load dump at charger plug-out)
    - channel_id: ch_041
      fault_type: voltage_sag
      start_s: 20.0
      duration_s: 5.0
      intensity: 0.90

    # ch_043  — thermal drift (HVAC compressor)
    - channel_id: ch_043
      fault_type: thermal_drift
      start_s: 70.0
      duration_s: 80.0
      intensity: 0.60

    # ch_045  — overload spike (wiper de-ice load)
    - channel_id: ch_045
      fault_type: overload_spike
      start_s: 105.0
      duration_s: 4.0
      intensity: 0.72

    # ch_048  — gradual degradation (suspension actuator wear)
    - channel_id: ch_048
      fault_type: gradual_degradation
      start_s: 110.0
      duration_s: 120.0
      intensity: 0.50

    # ch_052  — intermittent overload (headlamp motor levelling)
    - channel_id: ch_052
      fault_type: intermittent_overload
      start_s: 155.0
      duration_s: 25.0
      intensity: 0.62

    # ── zone_central ──────────────────────────────────────────────
    # ch_056  — overload spike on main power distribution budd
    - channel_id: ch_056
      fault_type: overload_spike
      start_s: 15.0
      duration_s: 2.0
      intensity: 0.88

    # ch_058  — thermal drift on power rail
    - channel_id: ch_058
      fault_type: thermal_drift
      start_s: 160.0
      duration_s: 90.0
      intensity: 0.55

    # ch_060  — voltage sag (battery management event)
    - channel_id: ch_060
      fault_type: voltage_sag
      start_s: 230.0
      duration_s: 15.0
      intensity: 0.75

    # ch_063  — connector aging on reserve rail
    - channel_id: ch_063
      fault_type: connector_aging
      start_s: 250.0
      duration_s: 45.0
      intensity: 0.48

features:
  window_duration_s: 5.0
  min_duration_s: 1.0

storage:
  output_dir: output
  format: parquet
